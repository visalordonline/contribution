<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROSPEROUS CO-OPERATIVE - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.5); }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .login-container {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .input-field {
            transition: all 0.3s ease;
        }

        .input-field:focus {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .signup-link {
            color: #667eea;
            transition: all 0.3s ease;
        }

        .signup-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        .loader {
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQY_NSthcHARv0S9rkAAikP0leF9Kl29k",
            authDomain: "contribution-c5309.firebaseapp.com",
            projectId: "contribution-c5309",
            messagingSenderId: "800641687170",
            appId: "1:800641687170:web:36e0e50bdd8cf39844de9b",
            measurementId: "G-DTJGZE3JEP"
        };

        let auth, db;
        let isCheckingAuth = true;

        const loginForm = document.getElementById('login-form');
        const messageModal = document.getElementById('message-modal');
        const messageModalText = document.getElementById('message-modal-text');
        const messageModalTitle = document.getElementById('message-modal-title');
        const loginContainer = document.getElementById('login-container');
        const loadingContainer = document.getElementById('loading-container');

        function initializeFirebase() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Check if user is already logged in
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        // User is logged in, redirect to dashboard
                        console.log('User already logged in:', user.email);
                        try {
                            // Verify user data exists in Firestore
                            const userDocRef = doc(db, "users", user.uid);
                            const userDocSnap = await getDoc(userDocRef);
                            
                            if (userDocSnap.exists()) {
                                console.log('User data found:', userDocSnap.data());
                                // Redirect to dashboard
                                window.location.href = 'servicelist.html';
                            } else {
                                console.log('User data not found in Firestore');
                                showMessage('Warning', 'User data incomplete. Please sign up again.');
                            }
                        } catch (error) {
                            console.error('Error checking user data:', error);
                        }
                    } else {
                        // User is not logged in
                        loginContainer.classList.remove('hidden');
                        loadingContainer.classList.add('hidden');
                        isCheckingAuth = false;
                    }
                });
            } catch (error) {
                showMessage('Error', `Failed to initialize: ${error.message}`);
                loadingContainer.classList.add('hidden');
                loginContainer.classList.remove('hidden');
                isCheckingAuth = false;
            }
        }

        function showMessage(title, text) {
            messageModalTitle.textContent = title;
            messageModalText.textContent = text;
            messageModal.classList.remove('hidden');
            setTimeout(() => {
                messageModal.classList.add('hidden');
            }, 4000);
        }

        // Login Form Submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = loginForm['login-email'].value.trim();
            const password = loginForm['login-password'].value;
            const submitBtn = loginForm.querySelector('button');

            // Validation
            if (!email) {
                showMessage('Error', 'Please enter your email.');
                return;
            }

            if (!password) {
                showMessage('Error', 'Please enter your password.');
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="inline-block mr-2">Logging in</span><i class="fas fa-spinner fa-spin"></i>';

                // Sign in with email and password
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log('User signed in:', user.email);

                // Get user data from Firestore
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    console.log('User data retrieved:', userData);

                    // Store user data in session storage for quick access
                    sessionStorage.setItem('user', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        name: userData.name,
                        books: userData.books
                    }));

                    showMessage('Success', `Welcome back, ${userData.name}!`);

                    // Redirect to dashboard after short delay
                    setTimeout(() => {
                        window.location.href = 'servicelist.html';
                    }, 1500);
                } else {
                    console.error('User document not found');
                    showMessage('Error', 'User data not found. Please contact support.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Log In';
                }
            } catch (error) {
                console.error('Login error:', error);
                
                let errorMessage = 'Login failed. Please try again.';
                
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Email not found. Please sign up first.';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Incorrect password. Please try again.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Too many login attempts. Please try again later.';
                }

                showMessage('Error', errorMessage);
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Log In';
            }
        });

        // Modal Close
        document.getElementById('message-modal-close').addEventListener('click', () => {
            messageModal.classList.add('hidden');
        });

        document.getElementById('message-modal').addEventListener('click', function(e) {
            if (e.target === messageModal) {
                messageModal.classList.add('hidden');
            }
        });

        // Sign Up Link
        document.getElementById('signup-link').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'signup.html';
        });

        // Password visibility toggle
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('login-password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Initialize on page load
        window.onload = initializeFirebase;
    </script>

    <!-- Loading Container -->
    <div id="loading-container" class="w-full h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-white text-lg font-semibold">Checking authentication...</p>
        </div>
    </div>

    <!-- Login Container -->
    <div id="login-container" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md fade-in">
            <!-- Logo Section -->
            <div class="text-center mb-8">
                <div class="inline-block mb-4">
                    <i class="fas fa-handshake text-white text-5xl"></i>
                </div>
                <h1 class="text-4xl font-bold text-white mb-2">PROSPEROUS CO-OPERATIVE</h1>
                <p class="text-blue-100 text-lg">Member Portal</p>
            </div>

            <!-- Login Card -->
            <div class="login-container rounded-2xl shadow-2xl p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Welcome Back</h2>

                <form id="login-form" class="space-y-4">
                    <!-- Email Input -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-envelope mr-2 text-blue-600"></i>Email Address
                        </label>
                        <input
                            type="email"
                            id="login-email"
                            placeholder="Enter your email"
                            required
                            class="input-field w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
                        />
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            <i class="fas fa-lock mr-2 text-blue-600"></i>Password
                        </label>
                        <div class="relative">
                            <input
                                type="password"
                                id="login-password"
                                placeholder="Enter your password"
                                required
                                class="input-field w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
                            />
                            <button
                                type="button"
                                id="toggle-password"
                                class="absolute right-3 top-3 text-gray-500 hover:text-gray-700"
                            >
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex justify-between items-center text-sm">
                        <label class="flex items-center text-gray-600">
                            <input type="checkbox" class="mr-2 rounded" />
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="text-blue-600 hover:text-blue-700 font-semibold">Forgot Password?</a>
                    </div>

                    <!-- Login Button -->
                    <button
                        type="submit"
                        class="btn-login w-full text-white font-bold py-3 rounded-lg transition duration-300 mt-6 flex items-center justify-center"
                    >
                        <i class="fas fa-sign-in-alt mr-2"></i>Log In
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">New to Prosperous?</span>
                    </div>
                </div>

                <!-- Sign Up Link -->
                <p class="text-center text-gray-600 mb-4">
                   <!-- Don't have an account?-->
                    <a href="signup.html" id="signup-link" class="signup-link font-semibold">
                        .
                    </a>
                </p>

                <!-- Support Info -->
                <div class="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <p class="text-xs text-gray-600 text-center">
                        <i class="fas fa-shield-alt text-blue-600 mr-1"></i>
                        Secure login. Your data is protected.
                    </p>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-6 text-blue-100 text-sm">
                <p>&copy; 2024 Prosperous Co-operative. All rights reserved.</p>
            </div>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="message-modal" class="fixed inset-0 hidden flex items-center justify-center z-50 modal-backdrop">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-sm mx-4 transform transition-all duration-300 scale-95">
            <div class="flex justify-between items-center mb-4">
                <h3 id="message-modal-title" class="text-xl font-bold text-gray-800">Message</h3>
                <button id="message-modal-close" class="text-gray-500 hover:text-gray-800 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <p id="message-modal-text" class="text-gray-700"></p>
        </div>
    </div>
</body>
</html>
